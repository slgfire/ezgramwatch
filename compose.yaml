services:
  ezgramwatch:
    image: ghcr.io/slgfire/ezgramwatch:latest
    container_name: ezgramwatch
    restart: unless-stopped
    env_file: .env
    environment:
      LOG_PRETTY: "true"
    volumes:
      - ./data:/data
    # Runs as node user (uid=1000). If you get "unable to open database file",
    # either run: sudo chown -R 1000:1000 ./data
    # or change this to: user: "root"
    user: "1000:1000"
