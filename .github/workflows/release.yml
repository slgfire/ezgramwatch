name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Docker Image

            ```bash
            docker pull ghcr.io/slgfire/ezgramwatch:${{ github.ref_name }}
            ```

            Or use `latest` for the most recent release:

            ```bash
            docker pull ghcr.io/slgfire/ezgramwatch:latest
            ```

            See the [README](https://github.com/slgfire/ezgramwatch#readme) for setup and configuration instructions.
